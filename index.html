<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Movie & Trailer Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b12;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* प्रीमियम नेविगेशन बार */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
            padding: 15px 0;
            border-bottom: 2px solid #1e1e2f;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .home-btn {
            background: #e50914; /* नेटफ्लिक्स रेड */
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .home-btn:hover {
            background: #b81d24;
        }

        h1 {
            color: #e50914;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* सर्च बार */
        .search-box {
            display: flex;
            align-items: center;
            width: 40%;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #2e2e4f;
            background: #141423;
            color: white;
            border-radius: 4px 0 0 4px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #e50914;
        }

        .search-box button {
            padding: 10px 20px;
            border: none;
            background: #2e2e4f;
            color: white;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }

        /* मूवी ग्रिड और पोस्टर्स */
        .movie-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 1200px;
        }

        .movie-card {
            background: #141423;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #1e1e2f;
            width: 220px;
            text-align: left;
        }

        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
            border-color: #e50914;
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-info h3 {
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-info .rating {
            color: #ffb400;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* वीडियो प्लेयर विंडो */
        #player-container {
            display: none;
            width: 100%;
            max-width: 850px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            border: 2px solid #e50914;
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.4);
            margin-top: 20px;
        }

        .video-box {
            width: 100%;
            height: 480px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-section">
            <button class="home-btn" onclick="goHome()">Home</button>
            <h1>Race Movies</h1>
        </div>
        
        <div class="search-box">
            <input type="text" id="movieSearch" onkeyup="searchMovie()" placeholder="मूवी सर्च करें...">
            <button>🔍</button>
        </div>
    </div>

    <div class="movie-container" id="movieContainer">
        
        <div class="movie-card" onclick="playTrailer('https://www.youtube.com/embed/dQw4w9WgXcQ')">
            <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500" alt="Movie Poster">
            <div class="movie-info">
                <h3>Interstellar</h3>
                <span class="rating">⭐ 8.7/10</span>
            </div>
        </div>

        <div class="movie-card" onclick="playTrailer('https://www.youtube.com/embed/tgbNymZ7vqY')">
            <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500" alt="Movie Poster">
            <div class="movie-info">
                <h3>The Dark Knight</h3>
                <span class="rating">⭐ 9.0/10</span>
            </div>
        </div>

        <div class="movie-card" onclick="playTrailer('https://www.youtube.com/embed/kJQP7kiw5Fk')">
            <img src="https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=500" alt="Movie Poster">
            <div class="movie-info">
                <h3>Inception</h3>
                <span class="rating">⭐ 8.8/10</span>
            </div>
        </div>

    </div>

    <div id="player-container">
        <div class="video-box">
            <iframe id="trailer-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // ट्रेलर प्ले करने के लिए
        function playTrailer(embedUrl) {
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('trailer-player');
            
            iframe.src = embedUrl;
            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth' });
        }

        // होम बटन के लिए
        function goHome() {
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('trailer-player');
            const searchInput = document.getElementById('movieSearch');
            const cards = document.getElementsByClassName('movie-card');
            
            iframe.src = "";
            container.style.display = 'none';
            searchInput.value = "";
            
            for (let i = 0; i < cards.length; i++) {
                cards[i].style.display = "block";
            }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // मूवी सर्च करने के लिए (लाइव फ़िल्टर)
        function searchMovie() {
            let input = document.getElementById('movieSearch').value.toLowerCase();
            let cards = document.getElementsByClassName('movie-card');
            
            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByTagName('h3')[0].innerText.toLowerCase();
                if (title.includes(input)) {
                    cards[i].style.display = "block";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
