<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceDrive - HDHub Premium Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #0b0b10; color: #ffffff; padding-bottom: 110px; overflow-x: hidden; }
        
        /* 🌌 Header Style */
        .header { width: 100%; background: #000000; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #e50914; position: sticky; top: 0; z-index: 100; box-shadow: 0 4px 20px rgba(0,0,0,0.8); }
        .logo { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; color: #fff; }
        .logo span { color: #e50914; }

        /* 🎬 Hero Banner */
        .hero-banner { width: 90%; max-width: 1200px; height: 180px; margin: 20px auto; background: linear-gradient(rgba(0,0,0,0.3), #0b0b10), url('https://picsum.photos/id/250/800/400') no-repeat center center/cover; border-radius: 16px; display: flex; align-items: flex-end; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.05); }
        .hero-text h1 { font-size: 1.4rem; font-weight: 800; text-shadow: 2px 2px 10px rgba(0,0,0,0.9); }
        .hero-text p { font-size: 0.85rem; color: #cccccc; margin-top: 4px; }

        /* 🏷️ Category Filter Tags */
        .filter-tags { display: flex; gap: 10px; width: 90%; max-width: 1200px; margin: 15px auto; overflow-x: auto; padding-bottom: 5px; }
        .filter-tags::-webkit-scrollbar { height: 0px; }
        .tag-btn { background: #171721; color: #fff; border: 1px solid #262636; padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s; }
        .tag-btn:hover, .tag-btn.active { background: #e50914; border-color: #e50914; box-shadow: 0 0 12px rgba(229, 9, 20, 0.4); }

        /* 🔍 Search Bar & 🌐 Language Selector Box */
        .search-container { display: none; width: 90%; max-width: 600px; margin: 15px auto 0 auto; }
        .search-wrapper { display: flex; gap: 10px; width: 100%; }
        .search-box { flex: 1; padding: 12px 20px; background: #171721; border: 1px solid #262636; border-radius: 25px; color: #fff; font-size: 1rem; outline: none; }
        .search-box:focus { border-color: #e50914; }
        
        /* 🌐 Language Dropdown Style */
        .lang-select { background: #171721; color: #fff; border: 1px solid #262636; padding: 0 15px; border-radius: 25px; font-size: 0.9rem; font-weight: 600; outline: none; cursor: pointer; transition: 0.2s; }
        .lang-select:focus { border-color: #e50914; }

        /* 💎 Content Grid */
        .content-section { width: 90%; max-width: 1200px; margin: 0 auto; }
        .section-title { font-size: 1.2rem; font-weight: 700; margin: 25px 0 15px 0; display: flex; align-items: center; border-left: 4px solid #e50914; padding-left: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        
        /* 🖼️ Card Design */
        .movie-card { background: #13131a; border-radius: 10px; overflow: hidden; cursor: pointer; transition: all 0.25s ease; border: 1px solid #1f1f2e; box-shadow: 0 5px 15px rgba(0,0,0,0.4); display: flex; flex-direction: column; position: relative; }
        .movie-card:hover { transform: translateY(-5px); border-color: #e50914; box-shadow: 0 8px 25px rgba(229, 9, 20, 0.4); }
        .poster-box { width: 100%; height: 210px; overflow: hidden; position: relative; background: #1a1a24; }
        .poster-box img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .tag-quality { position: absolute; bottom: 8px; left: 8px; background: #00875a; color: #fff; font-size: 0.65rem; font-weight: bold; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; }
        .tag-quality.live { background: #e50914; animation: blink 1.5s infinite; }
        
        /* Language Badge on Card */
        .tag-lang { position: absolute; top: 8px; right: 8px; background: rgba(0, 0, 0, 0.8); color: #fff; font-size: 0.65rem; font-weight: bold; padding: 3px 6px; border-radius: 4px; text-transform: uppercase; border: 1px solid rgba(255,255,255,0.1); }

        .movie-details { padding: 10px; text-align: left; background: #13131a; flex: 1; display: flex; align-items: center; }
        .movie-details h3 { font-size: 0.85rem; font-weight: 600; color: #eceff4; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; }

        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* 📱 Bottom Navigation */
        .bottom-nav { position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 360px; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-radius: 30px; display: flex; justify-content: space-around; padding: 12px 0; border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); z-index: 1000; }
        .nav-item { color: rgba(255, 255, 255, 0.6); font-size: 1.1rem; display: flex; flex-direction: column; align-items: center; text-decoration: none; cursor: pointer; background: none; border: none; outline: none; transition: 0.2s; }
        .nav-item span { font-size: 0.7rem; font-weight: 600; margin-top: 4px; }
        .nav-item.active, .nav-item:hover { color: #e50914; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Race<span>Drive</span></div>
    </div>

    <div class="hero-banner">
        <div class="hero-text">
            <h1>Premium HD Streaming</h1>
            <p>HD Movies & Live TV Channels Hub</p>
        </div>
    </div>

    <div class="filter-tags">
        <button class="tag-btn active" id="btn-all" onclick="filterCategory('all', this)">All Content</button>
        <button class="tag-btn" id="btn-drama" onclick="filterCategory('drama', this)">Drama & Classics</button>
        <button class="tag-btn" id="btn-scifi" onclick="filterCategory('scifi', this)">Sci-Fi & Action</button>
        <button class="tag-btn" id="btn-livetv" onclick="filterCategory('livetv', this)">📺 Live TV</button>
    </div>

    <div class="search-container" id="searchContainer">
        <div class="search-wrapper">
            <input type="text" class="search-box" id="searchInput" placeholder="मूवी या लाइव चैनल खोजें..." oninput="searchAndFilter()">
            <select class="lang-select" id="langSelect" onchange="searchAndFilter()">
                <option value="all">🌐 All Languages</option>
                <option value="hindi">Hindi</option>
                <option value="english">English</option>
                <option value="telugu">Telugu</option>
                <option value="punjabi">Punjabi</option>
            </select>
        </div>
    </div>

    <div class="content-section">
        <div class="section-title" id="mainSectionTitle">Latest Uploads</div>
        <div class="grid-container" id="cardsContainer"></div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" id="homeTab" onclick="showHome()"><i class="fas fa-home"></i><span>Home</span></button>
        <button class="nav-item" id="searchTab" onclick="toggleSearch()"><i class="fas fa-search"></i><span>Search</span></button>
        <button class="nav-item" id="liveTvTab" onclick="showLiveTv()"><i class="fas fa-tv"></i><span>Live TV</span></button>
    </nav>

    <script>
        // 🍿 डेटाबेस जिसमें Movies और Live TV चैनल्स भाषा (Language) के साथ हैं
        const moviesDatabase = [
            { title: "The Shawshank Redemption (Official Trailer)", poster: "https://picsum.photos/id/101/300/420", youtubeId: "PLl99DfY6b4", quality: "1080p Web", category: "drama", lang: "english" },
            { title: "The Godfather (50th Anniversary Trailer)", poster: "https://picsum.photos/id/102/300/420", youtubeId: "UaVTIH8ceSI", quality: "4K UHD", category: "drama", lang: "english" },
            { title: "Pulp Fiction (Official Trailer)", poster: "https://picsum.photos/id/103/300/420", youtubeId: "s7EdQ4FqbhY", quality: "1080p HD", category: "drama", lang: "english" },
            { title: "The Dark Knight (Main Trailer)", poster: "https://picsum.photos/id/104/300/420", youtubeId: "EXeTwQWrcwY", quality: "4K UHD", category: "scifi", lang: "hindi" },
            { title: "Inception (Official Trailer)", poster: "https://picsum.photos/id/106/300/420", youtubeId: "YoHD9XEInc0", quality: "1080p Bluray", category: "scifi", lang: "hindi" },
            
            // 📺 100% वर्किंग लाइव टीवी चैनल्स (अलग-अलग भाषाओं में)
            { title: "Aaj Tak Live News Channel", poster: "https://picsum.photos/id/234/300/420", youtubeId: "Nq2wYlWFucg", quality: "LIVE", category: "livetv", lang: "hindi" },
            { title: "India TV Live News", poster: "https://picsum.photos/id/235/300/420", youtubeId: "Xmm3Kr5P1Tw", quality: "LIVE", category: "livetv", lang: "hindi" },
            { title: "Sky News Live Stream", poster: "https://picsum.photos/id/240/300/420", youtubeId: "9Auqeyvkw28", quality: "LIVE", category: "livetv", lang: "english" },
            { title: "V6 News Telugu Live", poster: "https://picsum.photos/id/241/300/420", youtubeId: "3mAn_9S5CgY", quality: "LIVE", category: "livetv", lang: "telugu" },
            { title: "PTC News Punjabi Live", poster: "https://picsum.photos/id/242/300/420", youtubeId: "p57zUu_GfL0", quality: "LIVE", category: "livetv", lang: "punjabi" }
        ];

        let currentCategory = 'all';

        function displayContent(data) {
            const container = document.getElementById('cardsContainer');
            container.innerHTML = "";
            if(data.length === 0) {
                container.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:#777; margin-top:20px;'>कोई डेटा नहीं मिला। कृपया भाषा या नाम बदलें।</p>";
                return;
            }
            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.setAttribute('onclick', `goToPlayer('${item.youtubeId}', '${encodeURIComponent(item.title)}')`);
                
                const isLive = item.quality === "LIVE" ? "tag-quality live" : "tag-quality";

                card.innerHTML = `
                    <div class="poster-box">
                        <img src="${item.poster}" alt="${item.title}" onerror="this.onerror=null; this.src='https://picsum.photos/id/22/300/420';">
                        <span class="${isLive}">${item.quality}</span>
                        <span class="tag-lang">${item.lang}</span>
                    </div>
                    <div class="movie-details"><h3>${item.title}</h3></div>`;
                container.appendChild(card);
            });
        }

        function filterCategory(cat, btn) {
            currentCategory = cat;
            document.querySelectorAll('.tag-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            resetTabs();
            // भाषा फ़िल्टर को डिफ़ॉल्ट "all" पर रीसेट करना जब कैटेगरी बदले
            document.getElementById('langSelect').value = "all";

            if(cat === 'livetv') {
                document.getElementById('liveTvTab').classList.add('active');
                document.getElementById('mainSectionTitle').innerText = "📺 Live TV Channels";
                displayContent(moviesDatabase.filter(m => m.category === 'livetv'));
            } else if(cat === 'all') {
                document.getElementById('homeTab').classList.add('active');
                document.getElementById('mainSectionTitle').innerText = "Latest Uploads";
                displayContent(moviesDatabase);
            } else {
                document.getElementById('homeTab').classList.add('active');
                document.getElementById('mainSectionTitle').innerText = cat === 'drama' ? "Drama & Cult Classics" : "Sci-Fi & Action Movies";
                displayContent(moviesDatabase.filter(m => m.category === cat));
            }
        }

        // 🔍 Advanced Search + Language Filter Logic
        function searchAndFilter() {
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const selectedLang = document.getElementById('langSelect').value;

            let filteredData = moviesDatabase;

            // 1. कैटेगरी के अनुसार फ़िल्टर
            if (currentCategory !== 'all') {
                filteredData = filteredData.filter(m => m.category === currentCategory);
            }

            // 2. भाषा के अनुसार फ़िल्टर
            if (selectedLang !== 'all') {
                filteredData = filteredData.filter(m => m.lang === selectedLang);
            }

            // 3. सर्च टेक्स्ट के अनुसार फ़िल्टर
            if (searchQuery !== '') {
                filteredData = filteredData.filter(m => m.title.toLowerCase().includes(searchQuery));
            }

            displayContent(filteredData);
        }

        function goToPlayer(id, title) { window.location.href = `watch.html?id=${id}&title=${title}`; }
        
        function toggleSearch() { 
            resetTabs(); 
            document.getElementById('searchTab').classList.add('active'); 
            const sc = document.getElementById('searchContainer'); 
            sc.style.display = (sc.style.display === 'flex' || sc.style.display === 'block') ? 'none' : 'flex'; 
            if(sc.style.display === 'flex') document.getElementById('searchInput').focus(); 
        }
        
        function showHome() { 
            document.getElementById('searchContainer').style.display = 'none'; 
            filterCategory('all', document.getElementById('btn-all')); 
        }

        function showLiveTv() {
            // लाइव टीवी पर क्लिक करते ही सर्च बार अपने आप खुल जाएगा ताकि लोग फ़िल्टर कर सकें
            document.getElementById('searchContainer').style.display = 'flex';
            filterCategory('livetv', document.getElementById('btn-livetv'));
        }
        
        function resetTabs() { 
            document.getElementById('homeTab').classList.remove('active'); 
            document.getElementById('searchTab').classList.remove('active'); 
            document.getElementById('liveTvTab').classList.remove('active'); 
        }

        // Initial Load
        displayContent(moviesDatabase);
    </script>
</body>
</html>
