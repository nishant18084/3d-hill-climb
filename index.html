<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceDrive Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #0b0b10; color: #fff; padding-bottom: 50px; }
        
        .header { background: #000; padding: 15px 5%; border-bottom: 3px solid #e50914; display: flex; align-items: center; }
        .back-btn { color: #fff; font-size: 1.4rem; text-decoration: none; margin-right: 20px; }
        .logo { font-size: 1.5rem; font-weight: bold; text-transform: uppercase; }
        .logo span { color: #e50914; }
        
        .player-container { width: 92%; max-width: 850px; margin: 20px auto; background: #000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-radius: 12px; overflow: hidden; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-wrapper iframe, .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .movie-info { width: 92%; max-width: 850px; margin: 20px auto; }
        .movie-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; }
        
        .player-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; }
        .p-tag { background: #171721; padding: 6px 14px; border-radius: 6px; font-size: 0.8rem; color: #b3b3b3; }
        
        .action-section { background: #13131a; padding: 20px; border-radius: 10px; border: 1px solid #1f1f2e; display: flex; flex-direction: column; gap: 15px; }
        .row-item { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .row-title { font-size: 0.95rem; font-weight: bold; color: #b3b3b3; }
        
        .audio-select { background: #171721; color: #fff; border: 1px solid #262636; padding: 8px 15px; border-radius: 6px; }
        .download-btn { background: #00875a; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 6px; font-size: 0.9rem; font-weight: bold; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>

    <div class="header">
        <a href="#" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="logo">Race<span>Drive</span> Player</div>
    </div>

    <div class="player-container">
        <div class="video-wrapper" id="playerArea">
            </div>
    </div>

    <div class="movie-info">
        <h2 class="movie-title" id="mainTitle">Chumbak TV Special</h2>
        
        <div class="player-tags">
            <span class="p-tag" style="background: #e50914; color: #fff;"><i class="fas fa-bolt"></i> Direct High-Speed Server</span>
            <span class="p-tag" style="background: #e50914; color: #fff;">1080p Ultra HD</span>
        </div>

        <div class="action-section">
            <div class="row-item">
                <div class="row-title"><i class="fas fa-language"></i> Change Audio / Language</div>
                <select class="audio-select" id="audioSelect">
                    <option>🔊 Main Audio (Default)</option>
                </select>
            </div>
            
            <div class="row-item">
                <div class="row-title"><i class="fas fa-cloud-download-alt"></i> Available Options</div>
                <a href="#" id="dlLink" target="_blank" class="download-btn"><i class="fas fa-download"></i> Download Video (Direct)</a>
            </div>
        </div>
    </div>

    <script>
        // 🔗 यह कोड सीधे आपके चुंबक टीवी के ओरिजिनल लाइव स्ट्रीमिंग लिंक से कनेक्ट कर रहा है
        const liveStreamUrl = "https://shemaroome-live.akamaized.net/hls/live/2042971/Chumbak/master.m3u8";
        
        const playerArea = document.getElementById('playerArea');
        document.getElementById('dlLink').href = liveStreamUrl;

        // सीधे डायरेक्ट HTML5 प्लेयर में लोड करने का कनेक्शन लॉजिक
        playerArea.innerHTML = `<video id="videoObj" controls autoplay playsinline style="width:100%; height:100%;"></video>`;
        const video = document.getElementById('videoObj');

        if (Hls.isSupported()) {
            const hls = new Hls();
            hls.loadSource(liveStreamUrl);
            hls.attachMedia(video);
        } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
            video.src = liveStreamUrl;
        }
    </script>
</body>
</html>
