<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceDrive - Premium Streaming</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #0b0b12;
            color: #ffffff;
            padding-bottom: 50px;
        }

        .header {
            width: 100%;
            background: #161722;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e50914;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
        }

        .logo span {
            color: #e50914;
        }

        .content-section {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '';
            width: 5px;
            height: 20px;
            background: #e50914;
            margin-right: 10px;
            display: inline-block;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .movie-card {
            background: #141423;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, border-color 0.3s;
            border: 1px solid #1e1e2f;
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-5px);
            border-color: #e50914;
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
        }

        .poster-box {
            position: relative;
            width: 100%;
            height: 280px;
        }

        .poster-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tag-quality {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e50914;
            color: #fff;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .movie-details {
            padding: 15px;
        }

        .movie-details h3 {
            font-size: 0.95rem;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Race<span>Drive</span></div>
    </div>

    <div class="content-section">
        <div class="section-title">Motu Patlu (YouTube Specials)</div>
        <div class="grid-container" id="cartoonContainer"></div>

        <div class="section-title">Latest Movies</div>
        <div class="grid-container" id="movieContainer"></div>
    </div>

    <script>
        const moviesDatabase = [
            { 
                title: "Motu Patlu - Superheroes (Full)", 
                poster: "https://img.youtube.com/vi/aRJw72rniss/0.jpg", 
                videoUrl: "https://www.youtube.com/embed/aRJw72rniss", 
                quality: "720p", category: "cartoon" 
            },
            { 
                title: "Motu Patlu - In Airplane (Full)", 
                poster: "https://img.youtube.com/vi/4of37kzfX7w/0.jpg", 
                videoUrl: "https://www.youtube.com/embed/4of37kzfX7w", 
                quality: "720p", category: "cartoon" 
            },
            { 
                title: "Jana Nayagan (2026)", 
                poster: "32945.jpg", 
                videoUrl: "jana-nayagan.mp4", 
                quality: "HDRip", category: "movie" 
            },
            { 
                title: "Pushpa 2: The Rule", 
                poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", 
                videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4", 
                quality: "1080p Web", category: "movie" 
            }
        ];

        function displayContent(data) {
            const cartoonContainer = document.getElementById('cartoonContainer');
            const movieContainer = document.getElementById('movieContainer');
            cartoonContainer.innerHTML = "";
            movieContainer.innerHTML = "";

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.setAttribute('onclick', `goToPlayer('${item.videoUrl}', '${encodeURIComponent(item.title)}')`);
                
                card.innerHTML = `
                    <div class="poster-box">
                        <img src="${item.poster}" alt="${item.title}">
                        <span class="tag-quality">${item.quality}</span>
                    </div>
                    <div class="movie-details">
                        <h3>${item.title}</h3>
                    </div>
                `;

                if (item.category === 'cartoon') cartoonContainer.appendChild(card);
                else if (item.category === 'movie') movieContainer.appendChild(card);
            });
        }

        function goToPlayer(video, title) {
            window.location.href = `watch.html?video=${video}&title=${title}`;
        }

        displayContent(moviesDatabase);
    </script>
</body>
</html>
