<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceDrive - Movies & Games Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #060609; color: #fff; padding-bottom: 90px; overflow-x: hidden; }
        
        /* 🌌 Top Bar */
        .navbar { background: #000; padding: 15px 5%; border-bottom: 2px solid #e50914; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; color: #fff; text-decoration: none; letter-spacing: 1px; }
        .brand span { color: #e50914; }

        /* 🖥️ Full Screen App Mode Button */
        .web-fs-btn { background: #fff; color: #000; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; font-size: 0.85rem; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .web-fs-btn:hover { background: #e50914; color: #fff; }
        
        /* 📱 Main Layout Containers */
        .app-window { display: none; width: 94%; max-width: 900px; margin: 20px auto; animation: scaleUp 0.25s ease; }
        .app-window.active { display: block; }

        /* 📺 Player Box */
        .player-card { background: #0f0f15; border-radius: 16px; padding: 15px; border: 1px solid #1c1c28; box-shadow: 0 10px 30px rgba(0,0,0,0.5); margin-bottom: 25px; }
        .video-box { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #252538; }
        
        /* प्लेयर का साइज और पोस्टर इमेज सेटिंग */
        .video-js { width: 100% !important; height: auto !important; aspect-ratio: 16/9; }
        .vjs-poster { background-size: cover !important; background-position: center !important; }
        
        .stream-title { font-size: 1.2rem; font-weight: 800; margin-top: 12px; color: #fff; }

        /* 📑 Horizontal Content Rows */
        .row-section { margin-bottom: 25px; }
        .section-title { font-size: 1.1rem; font-weight: 800; color: #fff; margin-bottom: 12px; border-left: 4px solid #e50914; padding-left: 10px; text-transform: uppercase; }
        
        .content-scroll-box { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .content-scroll-box::-webkit-scrollbar { height: 4px; }
        .content-scroll-box::-webkit-scrollbar-thumb { background: #222233; border-radius: 10px; }

        /* 🎬 Card Design */
        .content-card { min-width: 120px; width: 120px; background: #0f0f15; border: 1px solid #1c1c28; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.2s; text-align: center; }
        .content-card:hover { transform: scale(1.04); border-color: #e50914; }
        .card-icon-box { width: 100%; height: 100px; background: #14141f; display: flex; align-items: center; justify-content: center; font-size: 2rem; color: #e50914; }
        .card-title { font-size: 0.75rem; font-weight: 700; padding: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #e0e0e6; }

        /* 🎮 Game Frame Popup */
        .game-popup { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; align-items: center; justify-content: center; }
        .game-popup.active { display: flex; }
        .popup-content { width: 95%; max-width: 450px; height: 80vh; background: #000; border-radius: 16px; overflow: hidden; border: 2px solid #00875a; position: relative; }
        .close-popup-btn { position: absolute; top: 10px; right: 10px; background: #e50914; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; z-index: 2100; }

        /* 📱 Bottom Nav Bar */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 2px solid #1c1c28; display: flex; justify-content: space-around; padding: 12px 0; z-index: 200; }
        .nav-item { background: none; border: none; color: #888899; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; font-size: 0.8rem; font-weight: 600; width: 45%; }
        .nav-item i { font-size: 1.4rem; }
        .nav-item.active { color: #e50914; }

        @keyframes scaleUp { from { transform: scale(0.98); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#" class="brand">Race<span>Drive</span> Hub</a>
        <button class="web-fs-btn" onclick="toggleMasterFullScreen()">
            <i id="fsIcon" class="fas fa-expand"></i> <span id="fsText">App Mode</span>
        </button>
    </div>

    <div id="homeWindow" class="app-window active">
        <div class="player-card">
            <div class="video-box">
                <video id="mainHubPlayer" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" poster="IMG_20260626_164127.jpg" playsinline></video>
            </div>
            <div class="stream-title" id="activeContentTitle">RaceDrive Premium Media Hub</div>
        </div>

        <div class="row-section">
            <div class="section-title"><i class="fas fa-film"></i> Blockbuster Movies</div>
            <div class="content-scroll-box" id="moviesContainer"></div>
        </div>
    </div>

    <div id="gamesWindow" class="app-window">
        <div class="player-card">
            <div class="section-title" style="border-color: #00875a;"><i class="fas fa-gamepad"></i> Instant Play Games</div>
            <div class="content-scroll-box" id="gamesContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px;"></div>
        </div>
    </div>

    <div class="game-popup" id="masterGamePopup">
        <div class="popup-content">
            <button class="close-popup-btn" onclick="closeGamePopup()">Close Game</button>
            <div id="gameIframeContainer" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchWindowTab('homeWindow', this)"><i class="fas fa-film"></i>Movies</button>
        <button class="nav-item" onclick="switchWindowTab('gamesWindow', this)"><i class="fas fa-gamepad"></i>Games</button>
    </div>

    <script>
        // 🍿 मूवीज लिस्ट
        const movieStreams = [
            { name: "Jana Nayagan (2026)", url: "https://rec.ustream.in/sadhna/live/playlist.m3u8", icon: "fa-mask" },
            { name: "Hollywood Sci-Fi Extra", url: "https://ddnews.akamaized.net/hls/live/2034336/ddnews/master.m3u8", icon: "fa-rocket" },
            { name: "Bollywood Hits", url: "https://pubads.g.doubleclick.net/ssai/event/O-M2XAnuR3WbQGv9a3B8Xw/master.m3u8", icon: "fa-heart" }
        ];

        // 🎮 गेम्स लिस्ट
        const gamesList = [
            { name: "Snake Arena", link: "https://m.gamesnacks.com/games/snake" },
            { name: "Tower Builder", link: "https://m.gamesnacks.com/games/towerbuilding" },
            { name: "Color Burst", link: "https://m.gamesnacks.com/games/colorburst" }
        ];

        let videoEngine = videojs('mainHubPlayer', { fluid: true });

        function loadVideo(title, url) {
            document.getElementById('activeContentTitle').innerText = title;
            videoEngine.src({ src: url, type: 'application/x-mpegURL' });
            videoEngine.play().catch(e => console.log("User action required."));
        }

        function launchGame(title, webLink) {
            videoEngine.pause(); 
            document.getElementById('gameIframeContainer').innerHTML = `<iframe src="${webLink}" style="width:100%; height:100%; border:none;"></iframe>`;
            document.getElementById('masterGamePopup').classList.add('active');
        }

        function closeGamePopup() {
            document.getElementById('masterGamePopup').classList.remove('active');
            document.getElementById('gameIframeContainer').innerHTML = ""; 
        }

        // मूवीज लिस्ट बनाना
        const movieBox = document.getElementById('moviesContainer');
        movieStreams.forEach((item) => {
            const card = document.createElement('div');
            card.className = 'content-card';
            card.onclick = () => loadVideo(item.name, item.url);
            card.innerHTML = `<div class="card-icon-box"><i class="fas ${item.icon}"></i></div><div class="card-title">${item.name}</div>`;
            movieBox.appendChild(card);
        });

        // गेम्स ग्रिड बनाना
        const gameBox = document.getElementById('gamesContainer');
        gamesList.forEach(game => {
            const card = document.createElement('div');
            card.className = 'content-card';
            card.onclick = () => launchGame(game.name, game.link);
            card.innerHTML = `<div class="card-icon-box" style="color: #00875a;"><i class="fas fa-gamepad"></i></div><div class="card-title">${game.name}</div>`;
            gameBox.appendChild(card);
        });

        function switchWindowTab(windowId, buttonEl) {
            document.querySelectorAll('.app-window').forEach(win => win.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            document.getElementById(windowId).classList.add('active');
            buttonEl.classList.add('active');
        }

        function toggleMasterFullScreen() {
            const doc = document.documentElement;
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                if (doc.requestFullscreen) doc.requestFullscreen();
                else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
                document.getElementById('fsText').innerText = "Exit App";
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                document.getElementById('fsText').innerText = "App Mode";
            }
        }
    </script>
</body>
</html>
