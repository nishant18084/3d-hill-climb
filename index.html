<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceDrive OTT - Ultimate Fixed Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #060609; color: #fff; padding-bottom: 90px; }
        
        /* 🌌 Header */
        .navbar { background: #000; padding: 15px 5%; border-bottom: 2px solid #e50914; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .brand { font-size: 1.6rem; font-weight: 900; text-transform: uppercase; color: #fff; text-decoration: none; letter-spacing: 1px; }
        .brand span { color: #e50914; }
        
        /* 📱 App Windows */
        .app-window { display: none; width: 94%; max-width: 800px; margin: 20px auto; animation: fadeIn 0.3s ease; }
        .app-window.active { display: block; }

        /* 📺 Player Box Fixes */
        .player-card { background: #0f0f15; border-radius: 16px; padding: 15px; border: 1px solid #1c1c28; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .video-box { position: relative; width: 100%; height: auto; background: #000; border-radius: 12px; overflow: hidden; border: 1px solid #252538; }
        
        /* Video.js रिस्पॉन्सिव स्टाइल */
        .video-js { width: 100% !important; height: auto !important; aspect-ratio: 16/9; }
        
        .stream-title { font-size: 1.4rem; font-weight: 800; margin-top: 15px; color: #fff; }
        
        /* ⚙️ Controls & Full Screen */
        .player-actions { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }
        .fs-btn { flex: 1; background: #e50914; color: #fff; border: none; padding: 14px; border-radius: 8px; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; box-shadow: 0 4px 15px rgba(229,9,20,0.3); transition: 0.2s; }
        .fs-btn:hover { background: #b80710; transform: scale(1.01); }
        .dl-btn { background: #00875a; color: #fff; text-decoration: none; padding: 14px 20px; border-radius: 8px; font-size: 1rem; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* 📑 Live TV Grid System */
        .grid-title { font-size: 1.2rem; font-weight: 800; color: #e50914; margin-bottom: 15px; text-transform: uppercase; }
        .channel-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 12px; max-height: 65vh; overflow-y: auto; padding-right: 5px; }
        .grid-item { background: #0f0f15; border: 1px solid #222233; border-radius: 12px; padding: 18px 10px; text-align: center; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .grid-item:hover, .grid-item.active { border-color: #e50914; background: #1c1c2a; }
        .grid-item i { font-size: 1.6rem; color: #e50914; }
        .grid-item span { font-size: 0.8rem; font-weight: 600; color: #e0e0e6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        /* 👤 Account Tab */
        .account-card { background: #0f0f15; border: 1px solid #1c1c28; border-radius: 16px; padding: 25px; text-align: center; }
        .avatar-large { width: 80px; height: 80px; background: #1c1c28; border: 3px solid #e50914; border-radius: 50%; margin: 0 auto 15px auto; display: flex; align-items: center; justify-content: center; font-size: 2.2rem; color: #ffb800; box-shadow: 0 0 20px rgba(229,9,20,0.3); }
        .acc-field { background: #14141f; border: 1px solid #222233; padding: 12px 15px; border-radius: 8px; margin-top: 12px; display: flex; justify-content: space-between; font-size: 0.95rem; }
        .logout-action { background: #e50914; color: #fff; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 25px; cursor: pointer; }

        /* 📱 Bottom Navigation Bar */
        .bottom-nav { position: fixed; bottom: 0; left: 0; width: 100%; background: #000; border-top: 2px solid #1c1c28; display: flex; justify-content: space-around; padding: 10px 0; z-index: 200; box-shadow: 0 -5px 25px rgba(0,0,0,0.6); }
        .nav-item { background: none; border: none; color: #888899; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.2s; width: 25%; }
        .nav-item i { font-size: 1.3rem; }
        .nav-item.active { color: #e50914; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #222233; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#" class="brand">Race<span>Drive</span> TV</a>
    </div>

    <div id="homeWindow" class="app-window active">
        <div class="player-card">
            <div class="video-box">
                <video id="mainOTTPlayer" class="video-js vjs-default-skin vjs-big-play-centered" controls autoplay preload="auto" playsinline></video>
            </div>
            <div class="stream-title" id="activeStreamTitle">Chumbak TV Special Live</div>
            
            <div class="player-actions">
                <button class="fs-btn" onclick="openFullScreen()"><i class="fas fa-expand"></i> Go Full Screen</button>
                <a href="#" id="directDownloadBtn" target="_blank" class="dl-btn"><i class="fas fa-download"></i> Source</a>
            </div>
        </div>
    </div>

    <div id="livetvWindow" class="app-window">
        <div class="player-card">
            <div class="grid-title"><i class="fas fa-broadcast-tower"></i> टीवी चैनल्स & मूवीज (1-100)</div>
            <div class="channel-grid" id="channelsGridBox"></div>
        </div>
    </div>

    <div id="accountWindow" class="app-window">
        <div class="account-card">
            <div class="avatar-large"><i class="fas fa-crown"></i></div>
            <h3>RaceDrive User</h3>
            <p style="color: #888899; font-size: 0.85rem; margin-bottom: 15px;">Premium VIP Member</p>
            
            <div class="acc-field"><span>Account Type:</span> <span style="color: #ffb800; font-weight: bold;">Lifetime Free VIP</span></div>
            <div class="acc-field"><span>Active Devices:</span> <span>Mobile (This Device)</span></div>
            <div class="acc-field"><span>Server Core:</span> <span style="color: #00875a;">Video.js High-Speed</span></div>
            
            <button class="logout-action" onclick="alert('अकाउंट बिल्कुल सुरक्षित है!')">Reset Profile</button>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('homeWindow', this)"><i class="fas fa-home"></i>Home</button>
        <button class="nav-item" onclick="switchTab('livetvWindow', this)"><i class="fas fa-tv"></i>Live TV</button>
        <button class="nav-item" onclick="switchTab('accountWindow', this)"><i class="fas fa-user-circle"></i>Account</button>
    </div>

    <script>
        // 🍿 स्टेबल लाइव .m3u8 लिंक्स का कलेक्शन
        const pureLiveStreams = [
            { name: "Chumbak TV Special Live", url: "https://shemaroome-live.akamaized.net/hls/live/2042971/Chumbak/master.m3u8" },
            { name: "Shemaroo TV Live", url: "https://shemaroome-live.akamaized.net/hls/live/2042971/ShemarooTV/master.m3u8" }
        ];

        // 1-100 ऑटोमैटिक चैनल्स
        const database = [];
        for (let i = 1; i <= 100; i++) {
            const raw = pureLiveStreams[(i - 1) % pureLiveStreams.length];
            database.push({
                name: i <= 2 ? raw.name : `चैनल संख्या ${i} (Live)`,
                url: raw.url
            });
        }

        const titleLabel = document.getElementById('activeStreamTitle');
        const dlBtn = document.getElementById('directDownloadBtn');
        const gridBox = document.getElementById('channelsGridBox');
        
        // Video.js प्लेयर इनिशियलाइज़ेशन
        let player = videojs('mainOTTPlayer');

        function selectAndPlay(index) {
            const item = database[index];
            titleLabel.innerText = item.name;
            dlBtn.href = item.url;

            document.querySelectorAll('.grid-item').forEach((btn, idx) => {
                if(idx === index) btn.classList.add('active');
                else btn.classList.remove('active');
            });

            // प्लेयर में नया लाइव सोर्स लोड करना
            player.src({
                src: item.url,
                type: 'application/x-mpegURL'
            });
            player.play();
            
            // चैनल चुनते ही सीधे 'Home' (प्लेयर स्क्रीन) पर स्विच करें
            switchTab('homeWindow', document.querySelectorAll('.nav-item')[0]);
        }

        // ग्रिड यूआई रेंडर करना
        database.forEach((item, index) => {
            const el = document.createElement('div');
            el.className = 'grid-item';
            if(index === 0) el.classList.add('active');
            el.onclick = () => selectAndPlay(index);
            el.innerHTML = `<i class="fas fa-play-circle"></i><span>${item.name}</span>`;
            gridBox.appendChild(el);
        });

        // डिफ़ॉल्ट रूप से पहला चैनल शुरू करें
        player.ready(function() {
            if(database.length > 0) selectAndPlay(0);
        });

        // 📱 टैब स्विचिंग लॉजिक
        function switchTab(windowId, buttonEl) {
            document.querySelectorAll('.app-window').forEach(win => win.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            
            document.getElementById(windowId).classList.add('active');
            buttonEl.classList.add('active');
        }

        // 🖥️ परफेक्ट फुल स्क्रीन मोड
        function openFullScreen() {
            if (player.isFullscreen()) {
                player.exitFullscreen();
            } else {
                player.requestFullscreen();
            }
        }
    </script>
</body>
</html>
