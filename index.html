<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Entertainment Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b12;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .main-content {
            width: 100%;
            max-width: 1200px;
        }

        /* प्रीमियम नेविगेशन बार */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 30px;
            padding: 15px 0;
            border-bottom: 2px solid #1e1e2f;
        }

        h1 {
            color: #e50914;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        /* सर्च बार */
        .search-box {
            display: flex;
            align-items: center;
            width: 35%;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #2e2e4f;
            background: #141423;
            color: white;
            border-radius: 4px 0 0 4px;
            outline: none;
        }

        .search-box button {
            padding: 10px 20px;
            border: none;
            background: #2e2e4f;
            color: white;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }

        /* सेक्शन हेडिंग (जैसे: Motu Patlu, Movies) */
        .section-title {
            font-size: 1.5rem;
            color: #ffffff;
            margin: 20px 0 10px 0;
            border-left: 4px solid #e50914;
            padding-left: 10px;
            width: 100%;
            text-align: left;
        }

        /* मूवी ग्रिड */
        .movie-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-start;
            gap: 25px;
            margin-bottom: 40px;
            width: 100%;
        }

        .movie-card {
            background: #141423;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #1e1e2f;
            width: 220px;
            text-align: left;
        }

        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
            border-color: #e50914;
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-info h3 {
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-info .rating {
            color: #ffb400;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <div class="main-content">
        <div class="navbar">
            <h1>Race Entertainment Hub</h1>
            <div class="search-box">
                <input type="text" id="movieSearch" onkeyup="searchMovie()" placeholder="सर्च करें...">
                <button>🔍</button>
            </div>
        </div>

        <div class="section-title">👦 Motu Patlu Special</div>
        <div class="movie-container" id="cartoonContainer"></div>

        <div class="section-title">🎬 Movies & Blockbusters</div>
        <div class="movie-container" id="movieContainer"></div>
    </div>

    <script>
        // आपका मिक्स्ड डेटाबेस (यूट्यूब लिंक्स के साथ)
        const moviesDatabase = [
            { 
                title: "Motu Patlu - Superheroes (Full Episode)", 
                poster: "https://img.youtube.com/vi/aRJw72rniss/0.jpg", 
                videoUrl: "https://www.youtube.com/embed/aRJw72rniss", 
                rating: "9.5", 
                category: "cartoon" 
            },
            { 
                title: "Motu Patlu - In Airplane (Full Episode)", 
                poster: "https://img.youtube.com/vi/4of37kzfX7w/0.jpg", 
                videoUrl: "https://www.youtube.com/embed/4of37kzfX7w", 
                rating: "9.2", 
                category: "cartoon" 
            },
            { 
                title: "Jana Nayagan (2026)", 
                poster: "32945.jpg", 
                videoUrl: "jana-nayagan.mp4", 
                rating: "9.5", 
                category: "movie" 
            },
            { 
                title: "Pushpa 2: The Rule", 
                poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", 
                videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4", 
                rating: "9.2", 
                category: "movie" 
            }
        ];

        // साइट खुलते ही वीडियोज़ लोड करने का फंक्शन
        function displayContent(data) {
            const cartoonContainer = document.getElementById('cartoonContainer');
            const movieContainer = document.getElementById('movieContainer');
            
            cartoonContainer.innerHTML = "";
            movieContainer.innerHTML = "";

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.setAttribute('onclick', `goToPlayer('${item.videoUrl}', '${encodeURIComponent(item.title)}')`);
                
                card.innerHTML = `
                    <img src="${item.poster}" alt="${item.title}">
                    <div class="movie-info">
                        <h3>${item.title}</h3>
                        <span class="rating">⭐ ${item.rating}/10</span>
                    </div>
                `;

                if (item.category === 'cartoon') {
                    cartoonContainer.appendChild(card);
                } else if (item.category === 'movie') {
                    movieContainer.appendChild(card);
                }
            });
        }

        function goToPlayer(video, title) {
            window.location.href = `watch.html?video=${video}&title=${title}`;
        }

        // लाइव सर्च फंक्शन
        function searchMovie() {
            let input = document.getElementById('movieSearch').value.toLowerCase();
            let filtered = moviesDatabase.filter(movie => 
                movie.title.toLowerCase().includes(input)
            );
            displayContent(filtered);
        }

        // पहली बार पेज लोड होने पर कंटेंट दिखाना
        displayContent(moviesDatabase);
    </script>

</body>
</html>
