<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Movie & Trailer Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b12;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* प्रीमियम नेविगेशन बार */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
            padding: 15px 0;
            border-bottom: 2px solid #1e1e2f;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .home-btn {
            background: #e50914;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .home-btn:hover {
            background: #b81d24;
        }

        h1 {
            color: #e50914;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* सर्च बार */
        .search-box {
            display: flex;
            align-items: center;
            width: 40%;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #2e2e4f;
            background: #141423;
            color: white;
            border-radius: 4px 0 0 4px;
            outline: none;
        }

        .search-box input:focus {
            border-color: #e50914;
        }

        .search-box button {
            padding: 10px 20px;
            border: none;
            background: #2e2e4f;
            color: white;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }

        /* मूवी ग्रिड और पोस्टर्स */
        .movie-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 1200px;
        }

        .movie-card {
            background: #141423;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #1e1e2f;
            width: 220px;
            text-align: left;
        }

        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
            border-color: #e50914;
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-info h3 {
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-info .rating {
            color: #ffb400;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* वीडियो प्लेयर विंडो */
        #player-container {
            display: none;
            width: 100%;
            max-width: 850px;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            border: 2px solid #e50914;
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.4);
            margin-top: 20px;
        }

        .video-box {
            width: 100%;
            height: 480px;
        }

        iframe, video {
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo-section">
            <button class="home-btn" onclick="goHome()">Home</button>
            <h1>Race Movies</h1>
        </div>
        
        <div class="search-box">
            <input type="text" id="movieSearch" onkeyup="searchMovie()" placeholder="मूवी सर्च करें...">
            <button>🔍</button>
        </div>
    </div>

    <div class="movie-container" id="movieContainer"></div>

    <div id="player-container">
        <div class="video-box">
            <iframe id="iframe-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            <video id="html5-player" controls autoplay></video>
        </div>
    </div>

    <script>
        // 🌟 आपका अपना बड़ा मूवी डेटाबेस (यहाँ आप जितनी चाहें फिल्में जोड़ सकते हैं)
        const moviesDatabase = [
            { title: "Jana Nayagan (2026)", poster: "32945.jpg", url: "https://www.youtube.com/watch?v=jAtFtrWIKdw", rating: "9.5" },
            { title: "Pushpa 2: The Rule", poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", url: "https://www.youtube.com/watch?v=1kS9hC20mHQ", rating: "9.2" },
            { title: "Kalki 2898 AD", poster: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500", url: "https://www.youtube.com/watch?v=kQDd1AhGIHk", rating: "8.9" },
            { title: "Stree 2", poster: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=500", url: "https://www.youtube.com/watch?v=KVnheXw8_R4", rating: "8.7" },
            { title: "Jawan", poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", url: "https://www.youtube.com/watch?v=MWOlnZSnXJo", rating: "8.5" },
            { title: "Pathaan", poster: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500", url: "https://www.youtube.com/watch?v=vqu4zblH-DQ", rating: "8.2" },
            { title: "Animal", poster: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=500", url: "https://www.youtube.com/watch?v=Dydmp0WAsKw", rating: "8.6" },
            { title: "Tiger 3", poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", url: "https://www.youtube.com/watch?v=vMzm3SQQco0", rating: "7.8" },
            { title: "Interstellar", poster: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500", url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ", rating: "8.7" },
            { title: "The Dark Knight", poster: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=500", url: "https://youtu.be/tgbNymZ7vqY", rating: "9.0" },
            { title: "Inception", poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", url: "https://www.youtube.com/watch?v=kJQP7kiw5Fk", rating: "8.8" },
            { title: "Salaar", poster: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500", url: "https://www.youtube.com/watch?v=H7Z8S-64l5M", rating: "8.4" },
            { title: "Dunki", poster: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=500", url: "https://www.youtube.com/watch?v=U7XitL_ZMM4", rating: "8.0" },
            { title: "Fighter", poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", url: "https://www.youtube.com/watch?v=6amIq_mP4xM", rating: "8.1" },
            { title: "Shaitaan", poster: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500", url: "https://www.youtube.com/watch?v=gTshZidV0p4", rating: "8.3" }
            // 📝 आप इसके नीचे जितनी चाहें उतनी फ़िल्में (1000 तक) खुद ऐसे ही लिख कर जोड़ सकते हैं।
        ];

        // फिल्मों को पेज पर दिखाने का फंक्शन
        function loadMovies(moviesToRender) {
            const container = document.getElementById('movieContainer');
            container.innerHTML = ""; 

            moviesToRender.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.setAttribute('onclick', `playMedia('${movie.url}')`);
                
                card.innerHTML = `
                    <img src="${movie.poster}" alt="${movie.title}">
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <span class="rating">⭐ ${movie.rating}/10</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // लोड करें
        loadMovies(moviesDatabase);

        function playMedia(url) {
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('iframe-player');
            const videoTag = document.getElementById('html5-player');
            
            iframe.style.display = "none";
            iframe.src = "";
            videoTag.style.display = "none";
            videoTag.src = "";
            videoTag.pause();

            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                let embedLink = url;
                if (url.includes("watch?v=")) {
                    let videoId = url.split("v=")[1].split("&")[0];
                    embedLink = "https://www.youtube.com/embed/" + videoId;
                } else if (url.includes("youtu.be/")) {
                    let videoId = url.split("youtu.be/")[1].split("?")[0];
                    embedLink = "https://www.youtube.com/embed/" + videoId;
                }
                iframe.src = embedLink;
                iframe.style.display = "block";
            } else {
                videoTag.src = url;
                videoTag.style.display = "block";
            }
            
            container.style.display = 'block';
            container.scrollIntoView({ behavior: 'smooth' });
        }

        function goHome() {
            const container = document.getElementById('player-container');
            const iframe = document.getElementById('iframe-player');
            const videoTag = document.getElementById('html5-player');
            const searchInput = document.getElementById('movieSearch');
            
            iframe.src = "";
            videoTag.src = "";
            videoTag.pause();
            
            container.style.display = 'none';
            searchInput.value = "";
            
            loadMovies(moviesDatabase);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function searchMovie() {
            let input = document.getElementById('movieSearch').value.toLowerCase();
            let filteredMovies = moviesDatabase.filter(movie => 
                movie.title.toLowerCase().includes(input)
            );
            loadMovies(filteredMovies);
        }
    </script>

</body>
</html>
