<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceDrive - Movies & Games Galaxy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://vjs.zencdn.net/8.3.0/video-js.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="navbar">
        <a href="#" class="brand">Race<span>Drive</span> Hub</a>
        <button class="web-fs-btn" onclick="toggleMasterFullScreen()">
            <i id="fsIcon" class="fas fa-expand"></i> <span id="fsText">App Mode</span>
        </button>
    </div>

    <div id="homeWindow" class="app-window active">
        <div class="player-card">
            <div class="video-box">
                <video id="mainHubPlayer" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" poster="IMG_20260626_164127.jpg" playsinline></video>
            </div>
            <div class="stream-title" id="activeContentTitle">RaceDrive Premium Media Hub</div>
        </div>
        <div class="row-section">
            <div class="section-title"><i class="fas fa-film"></i> Blockbuster Movies</div>
            <div class="content-scroll-box" id="moviesContainer"></div>
        </div>
    </div>

    <div id="gamesWindow" class="app-window">
        <div class="player-card" id="gamesMenuSection">
            <div class="section-title" style="border-color: #00875a;"><i class="fas fa-space-shuttle"></i> Games Galaxy</div>
            <div class="content-scroll-box" id="gamesContainer" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px;"></div>
        </div>

        <div id="arcade-snake" class="arcade-container" style="display:none;">
            <h3>🐍 क्लासिक स्नेक गेम</h3>
            <div id="snakeScore" style="font-size:18px; margin:10px 0; color:#4CAF50;">स्कोर: 0</div>
            <canvas id="snakeCanvas" width="400" height="400"></canvas>
            <button class="back-arcade-btn" onclick="closeArcadeGame()">← गेम्स लिस्ट में वापस जाएं</button>
        </div>

        <div id="arcade-ttt" class="arcade-container" style="display:none;">
            <h3>❌ टिक-टैक-टो ⭕</h3>
            <div id="tttStatus" style="font-size:18px; margin:10px 0; color:#2196F3;">खिलाड़ी X की बारी</div>
            <div class="board" id="tttBoard">
                <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
                <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
                <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
            </div>
            <button class="back-arcade-btn" style="background-color:#4CAF50; margin-bottom:10px;" onclick="startSnakeArcadeLogic('ttt')">रीस्टार्ट गेम</button><br>
            <button class="back-arcade-btn" onclick="closeArcadeGame()">← गेम्स लिस्ट में वापस जाएं</button>
        </div>

        <div id="arcade-pong" class="arcade-container" style="display:none;">
            <h3>🏓 पोंग टेनिस (vs कंप्यूटर)</h3>
            <p style="font-size:12px; color:#aaa;">कंट्रोल करने के लिए Up/Down Arrow कीज का इस्तेमाल करें</p>
            <canvas id="pongCanvas" width="500" height="350"></canvas>
            <button class="back-arcade-btn" onclick="closeArcadeGame()">← गेम्स लिस्ट में वापस जाएं</button>
        </div>

        <div id="arcade-subway" class="arcade-container" style="display:none;">
            <h3>🏃 सबवे रनर</h3>
            <div id="subwayScore" style="font-size:18px; margin:10px 0; color:#e67e22;">स्कोर: 0</div>
            <canvas id="subwayCanvas" width="500" height="250"></canvas>
            <button class="back-arcade-btn" onclick="closeArcadeGame()">← गेम्स लिस्ट में वापस जाएं</button>
        </div>
    </div>

    <div class="game-popup" id="masterGamePopup">
        <div class="popup-content">
            <button class="close-popup-btn" onclick="closeGamePopup()">Close Game</button>
            <div id="gameIframeContainer" style="width: 100%; height: 100%;"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" onclick="switchWindowTab('homeWindow', this)"><i class="fas fa-film"></i>Movies</button>
        <button class="nav-item" onclick="switchWindowTab('gamesWindow', this)"><i class="fas fa-gamepad"></i>Games Galaxy</button>
    </div>

    <script src="https://vjs.zencdn.net/8.3.0/video.min.js"></script>
    <script src="data.js"></script>
    <script src="controls.js"></script>
    <script src="app.js"></script>
</body>
</html>
