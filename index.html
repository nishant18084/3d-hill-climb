<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Movie Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b12;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
            padding: 15px 0;
            border-bottom: 2px solid #1e1e2f;
        }

        h1 {
            color: #e50914;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
            font-size: 1.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .search-box {
            display: flex;
            align-items: center;
            width: 40%;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #2e2e4f;
            background: #141423;
            color: white;
            border-radius: 4px 0 0 4px;
            outline: none;
        }

        .search-box button {
            padding: 10px 20px;
            border: none;
            background: #2e2e4f;
            color: white;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }

        .movie-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
            width: 100%;
            max-width: 1200px;
        }

        .movie-card {
            background: #141423;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #1e1e2f;
            width: 220px;
            text-align: left;
        }

        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
            border-color: #e50914;
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-info h3 {
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-info .rating {
            color: #ffb400;
            font-size: 0.9rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <h1>Race Movies</h1>
        <div class="search-box">
            <input type="text" id="movieSearch" onkeyup="searchMovie()" placeholder="मूवी सर्च करें...">
            <button>🔍</button>
        </div>
    </div>

    <div class="movie-container" id="movieContainer"></div>

    <script>
        const moviesDatabase = [
            { title: "Jana Nayagan (2026)", poster: "32945.jpg", videoUrl: "jana-nayagan.mp4", rating: "9.5" },
            { title: "Pushpa 2: The Rule", poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", videoUrl: "pushpa2.mp4", rating: "9.2" },
            { title: "Kalki 2898 AD", poster: "https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=500", videoUrl: "kalki.mp4", rating: "8.9" },
            { title: "Stree 2", poster: "https://images.unsplash.com/photo-1509198397868-475647b2a1e5?w=500", videoUrl: "stree2.mp4", rating: "8.7" },
            { title: "Jawan", poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", videoUrl: "jawan.mp4", rating: "8.5" }
        ];

        function loadMovies(moviesToRender) {
            const container = document.getElementById('movieContainer');
            container.innerHTML = ""; 

            moviesToRender.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                // अब यह नए watch.html पेज पर रिडायरेक्ट करेगा मूवी के नाम और वीडियो लिंक के साथ
                card.setAttribute('onclick', `goToPlayer('${movie.videoUrl}', '${encodeURIComponent(movie.title)}')`);
                
                card.innerHTML = `
                    <img src="${movie.poster}" alt="${movie.title}">
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <span class="rating">⭐ ${movie.rating}/10</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        loadMovies(moviesDatabase);

        // नए पेज पर भेजने का फंक्शन
        function goToPlayer(video, title) {
            window.location.href = `watch.html?video=${video}&title=${title}`;
        }

        function searchMovie() {
            let input = document.getElementById('movieSearch').value.toLowerCase();
            let filteredMovies = moviesDatabase.filter(movie => 
                movie.title.toLowerCase().includes(input)
            );
            loadMovies(filteredMovies);
        }
    </script>

</body>
</html>welcome
