<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Race Movie & Cartoon Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b12;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* 🌟 वेलकम और स्टार्ट सेक्शन */
        .welcome-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 70vh;
            text-align: center;
        }

        .welcome-title {
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .welcome-title span {
            color: #e50914;
        }

        .start-btn {
            background: #e50914;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.4);
            transition: 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.05);
            background: #b81d24;
            box-shadow: 0 0 30px rgba(229, 9, 20, 0.6);
        }

        /* 🌟 दो ऑप्शन वाले बटन्स */
        .options-container {
            display: none; /* शुरुआत में छुपा रहेगा */
            gap: 20px;
            margin-top: 20px;
            animation: fadeIn 0.5s ease;
        }

        .opt-btn {
            background: #141423;
            color: white;
            border: 2px solid #2e2e4f;
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .opt-btn:hover {
            border-color: #e50914;
            background: #e50914;
            box-shadow: 0 5px 15px rgba(229, 9, 20, 0.3);
        }

        /* मेन कंटेंट (सर्च और मूवीज) शुरुआत में छुपा रहेगा */
        .main-content {
            display: none;
            width: 100%;
            max-width: 1200px;
        }

        /* प्रीमियम नेविगेशन बार */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 40px;
            padding: 15px 0;
            border-bottom: 2px solid #1e1e2f;
        }

        h1 {
            color: #e50914;
            text-shadow: 0 0 10px rgba(229, 9, 20, 0.3);
            font-size: 1.8rem;
            text-transform: uppercase;
        }

        /* सर्च बार */
        .search-box {
            display: flex;
            align-items: center;
            width: 40%;
            max-width: 500px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 15px;
            border: 1px solid #2e2e4f;
            background: #141423;
            color: white;
            border-radius: 4px 0 0 4px;
            outline: none;
        }

        .search-box button {
            padding: 10px 20px;
            border: none;
            background: #2e2e4f;
            color: white;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
        }

        /* मूवी ग्रिड */
        .movie-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-bottom: 40px;
        }

        .movie-card {
            background: #141423;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            border: 1px solid #1e1e2f;
            width: 220px;
            text-align: left;
        }

        .movie-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(229, 9, 20, 0.3);
            border-color: #e50914;
        }

        .movie-card img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .movie-info {
            padding: 12px;
        }

        .movie-info h3 {
            font-size: 1rem;
            color: #ffffff;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .movie-info .rating {
            color: #ffb400;
            font-size: 0.9rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="welcome-screen" id="welcomeScreen">
        <h2 class="welcome-title">Welcome to <span>Race Hub</span></h2>
        <button class="start-btn" id="startBtn" onclick="showOptions()">START</button>

        <div class="options-container" id="optionsContainer">
            <button class="opt-btn" onclick="filterCategory('movie')">🎬 Movies</button>
            <button class="opt-btn" onclick="filterCategory('cartoon')">👦 Motu Patlu</button>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="navbar">
            <h1 id="pageTitle">Race Movies</h1>
            <div class="search-box">
                <input type="text" id="movieSearch" onkeyup="searchMovie()" placeholder="सर्च करें...">
                <button>🔍</button>
            </div>
        </div>

        <div class="movie-container" id="movieContainer"></div>
    </div>

    <script>
        // 🌟 आपका अपना मिक्स डेटाबेस (category के साथ)
        const moviesDatabase = [
            { title: "Motu Patlu - Episode 1", poster: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=500", videoUrl: "motu-patlu-1.mp4", rating: "9.0", category: "cartoon" },
            { title: "Motu Patlu - Episode 2", poster: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=500", videoUrl: "motu-patlu-2.mp4", rating: "8.9", category: "cartoon" },
            { title: "Jana Nayagan (2026)", poster: "32945.jpg", videoUrl: "jana-nayagan.mp4", rating: "9.5", category: "movie" },
            { title: "Pushpa 2: The Rule", poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", videoUrl: "pushpa2.mp4", rating: "9.2", category: "movie" }
        ];

        let currentCategory = "all";

        // START बटन दबाने पर दो ऑप्शन दिखाना
        function showOptions() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('optionsContainer').style.display = 'flex';
        }

        // ऑप्शन सिलेक्ट करने पर कंटेंट लोड करना
        function filterCategory(category) {
            currentCategory = category;
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            if(category === 'cartoon') {
                document.getElementById('pageTitle').innerText = "Motu Patlu Show";
            } else {
                document.getElementById('pageTitle').innerText = "Race Movies";
            }

            const filtered = moviesDatabase.filter(item => item.category === category);
            loadMovies(filtered);
        }

        // कार्ड्स को स्क्रीन पर दिखाना (यह watch.html पर भेजेगा)
        function loadMovies(moviesToRender) {
            const container = document.getElementById('movieContainer');
            container.innerHTML = ""; 

            moviesToRender.forEach(movie => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.setAttribute('onclick', `goToPlayer('${movie.videoUrl}', '${encodeURIComponent(movie.title)}')`);
                
                card.innerHTML = `
                    <img src="${movie.poster}" alt="${movie.title}">
                    <div class="movie-info">
                        <h3>${movie.title}</h3>
                        <span class="rating">⭐ ${movie.rating}/10</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function goToPlayer(video, title) {
            window.location.href = `watch.html?video=${video}&title=${title}`;
        }

        function searchMovie() {
            let input = document.getElementById('movieSearch').value.toLowerCase();
            let filteredMovies = moviesDatabase.filter(movie => 
                movie.category === currentCategory && movie.title.toLowerCase().includes(input)
            );
            loadMovies(filteredMovies);
        }
    </script>

</body>
</html>WELCOME
