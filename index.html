<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceDrive - Premium Glass Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: #08080f;
            color: #ffffff;
            padding-bottom: 50px;
            background-image: radial-gradient(circle at 50% 0%, #1a1525 0%, #08080f 70%);
        }

        /* 🌌 प्रीमियम ग्लास नेविगेशन */
        .header {
            width: 100%;
            background: rgba(20, 21, 34, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 18px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.4);
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .logo span {
            color: #e50914;
            text-shadow: 0 0 15px rgba(229, 9, 20, 0.6);
        }

        .content-section {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 700;
            margin: 40px 0 20px 0;
            display: flex;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .section-title::before {
            content: '';
            width: 6px;
            height: 24px;
            background: #e50914;
            margin-right: 12px;
            border-radius: 4px;
            display: inline-block;
            box-shadow: 0 0 10px #e50914;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }

        /* 💎 3D ग्लास मूवी कार्ड्स */
        .movie-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* 🔥 3D ग्लो और पॉप-अप इफेक्ट */
        .movie-card:hover {
            transform: translateY(-8px) scale(1.02);
            border-color: #e50914;
            box-shadow: 0 15px 35px rgba(229, 9, 20, 0.35),
                        inset 0 0 15px rgba(255, 255, 255, 0.05);
        }

        .poster-box {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
        }

        .poster-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .movie-card:hover .poster-box img {
            transform: scale(1.08);
        }

        .tag-quality {
            position: absolute;
            top: 12px;
            left: 12px;
            background: rgba(229, 9, 20, 0.85);
            backdrop-filter: blur(4px);
            color: #fff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 6px;
            box-shadow: 0 4px 12px rgba(229, 9, 20, 0.4);
        }

        .movie-details {
            padding: 18px;
            background: rgba(10, 11, 18, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
        }

        .movie-details h3 {
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">Race<span>Drive</span></div>
    </div>

    <div class="content-section">
        <div class="section-title">Motu Patlu Mega Collection</div>
        <div class="grid-container" id="cartoonContainer"></div>

        <div class="section-title">Latest Blockbusters</div>
        <div class="grid-container" id="movieContainer"></div>
    </div>

    <script>
        // यहाँ से आप जितनी चाहें उतनी मूवीज और बढ़ा सकते हैं!
        const moviesDatabase = [
            { 
                title: "Motu Patlu - Superheroes (Full Movie)", 
                poster: "https://img.youtube.com/vi/aRJw72rniss/0.jpg", 
                videoUrl: "https://www.youtube.com/embed/aRJw72rniss", 
                quality: "720p HD", category: "cartoon" 
            },
            { 
                title: "Motu Patlu - In Airplane (Full Episode)", 
                poster: "https://img.youtube.com/vi/4of37kzfX7w/0.jpg", 
                videoUrl: "https://www.youtube.com/embed/4of37kzfX7w", 
                quality: "720p HD", category: "cartoon" 
            },
            { 
                title: "Jana Nayagan (2026)", 
                poster: "32945.jpg", 
                videoUrl: "jana-nayagan.mp4", 
                quality: "4K UHD", category: "movie" 
            },
            { 
                title: "Pushpa 2: The Rule (2026)", 
                poster: "https://images.unsplash.com/photo-1536440136628-849c177e76a1?w=500", 
                videoUrl: "https://www.w3schools.com/html/mov_bbb.mp4", 
                quality: "1080p Web", category: "movie" 
            }
        ];

        function displayContent(data) {
            const cartoonContainer = document.getElementById('cartoonContainer');
            const movieContainer = document.getElementById('movieContainer');
            cartoonContainer.innerHTML = "";
            movieContainer.innerHTML = "";

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.setAttribute('onclick', `goToPlayer('${item.videoUrl}', '${encodeURIComponent(item.title)}')`);
                
                card.innerHTML = `
                    <div class="poster-box">
                        <img src="${item.poster}" alt="${item.title}" onerror="this.src='https://images.unsplash.com/photo-1440404653325-ab127d49abc1?w=500'">
                        <span class="tag-quality">${item.quality}</span>
                    </div>
                    <div class="movie-details">
                        <h3>${item.title}</h3>
                    </div>
                `;

                if (item.category === 'cartoon') cartoonContainer.appendChild(card);
                else if (item.category === 'movie') movieContainer.appendChild(card);
            });
        }

        function goToPlayer(video, title) {
            window.location.href = `watch.html?video=${video}&title=${title}`;
        }

        displayContent(moviesDatabase);
    </script>
</body>
</html>
