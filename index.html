<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceDrive TV - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background-color: #0b0b10; color: #fff; padding-bottom: 30px; }
        
        .navbar { background: #000; padding: 15px 5%; border-bottom: 3px solid #e50914; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-size: 1.6rem; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; text-decoration: none; color: #fff; }
        .brand span { color: #e50914; }

        .container { width: 90%; max-width: 1200px; margin: 30px auto; }
        .section-title { font-size: 1.3rem; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; color: #e50914; display: flex; align-items: center; gap: 8px; }

        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        
        .channel-card { background: #13131a; border: 1px solid #1f1f2e; border-radius: 10px; overflow: hidden; cursor: pointer; transition: 0.3s; text-decoration: none; color: #fff; display: block; }
        .channel-card:hover { transform: translateY(-5px); border-color: #e50914; box-shadow: 0 5px 20px rgba(229,9,20,0.2); }
        
        .thumbnail-box { width: 100%; aspect-ratio: 16/9; background: #1c1c27; display: flex; align-items: center; justify-content: center; position: relative; }
        .thumbnail-box i { font-size: 2.5rem; color: #3b3b4f; transition: 0.3s; }
        .channel-card:hover .thumbnail-box i { color: #e50914; scale: 1.1; }
        
        .live-badge { position: absolute; top: 10px; left: 10px; background: #e50914; color: #fff; font-size: 0.65rem; font-weight: bold; padding: 3px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.5px; }

        .info-box { padding: 12px; }
        .channel-name { font-size: 0.95rem; font-weight: bold; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .channel-category { font-size: 0.75rem; color: #8c8c9e; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="navbar">
        <a href="#" class="brand">Race<span>Drive</span> TV</a>
    </div>

    <div class="container">
        <div class="section-title"><i class="fas fa-play-circle"></i> मेरे अपने लाइव चैनल्स</div>
        <div class="grid-container" id="channelGrid">
            </div>
    </div>

    <script>
        // 🎬 चैनल्स का डेटाबेस - यहाँ अपनी .mp4 वीडियो लिंक्स डालें!
        const channels = [
            {
                name: "चुंबक टीवी स्पेशल (Demo)",
                category: "Entertainment",
                // यहाँ उदाहरण के लिए एक फ्री वर्किंग .mp4 फाइल लिंक दी है
                videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4"
            },
            {
                name: "RaceDrive न्यूज़ लाइव",
                category: "News",
                videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4"
            },
            {
                name: "स्पोर्ट्स हाईलाइट्स",
                category: "Sports",
                videoUrl: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4"
            }
        ];

        const grid = document.getElementById('channelGrid');

        channels.forEach(ch => {
            const card = document.createElement('a');
            card.className = 'channel-card';
            // यह सीधे watch.html पर डायरेक्ट वीडियो लिंक और टाइटल भेज देगा
            card.href = `watch.html?id=${encodeURIComponent(ch.videoUrl)}&title=${encodeURIComponent(ch.name)}`;
            
            card.innerHTML = `
                <div class="thumbnail-box">
                    <span class="live-badge">LIVE</span>
                    <i class="fas fa-tv"></i>
                </div>
                <div class="info-box">
                    <div class="channel-name">${ch.name}</div>
                    <div class="channel-category">${ch.category}</div>
                </div>
            `;
            grid.appendChild(card);
        });
    </script>
</body>
</html>
