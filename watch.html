<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RaceDrive - Playing Movie</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #0b0b10; color: #fff; padding-bottom: 50px; }
        .header { background: #000; padding: 15px; border-bottom: 3px solid #e50914; display: flex; align-items: center; }
        .back-btn { color: #fff; font-size: 1.2rem; text-decoration: none; margin-right: 15px; cursor: pointer; }
        .logo { font-size: 1.5rem; font-weight: bold; text-transform: uppercase; }
        .logo span { color: #e50914; }
        
        /* 📺 Player Box Container */
        .player-container { width: 100%; max-width: 800px; margin: 20px auto; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border-radius: 8px; overflow: hidden; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        
        .movie-info { width: 90%; max-width: 800px; margin: 15px auto; }
        .movie-title { font-size: 1.3rem; font-weight: bold; margin-bottom: 10px; color: #f1f1f1; }
        .player-tags { display: flex; gap: 10px; margin-top: 10px; }
        .p-tag { background: #222; padding: 5px 10px; border-radius: 4px; font-size: 0.75rem; color: #aaa; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i></a>
        <div class="logo">Race<span>Drive</span> Player</div>
    </div>

    <div class="player-container">
        <div class="video-wrapper">
            <iframe id="videoPlayer" src="" allowfullscreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"></iframe>
        </div>
    </div>

    <div class="movie-info">
        <h2 class="movie-title" id="videoTitle">Loading Title...</h2>
        <div class="player-tags">
            <span class="p-tag"><i class="fas fa-bolt"></i> Fast Server</span>
            <span class="p-tag"><i class="fas fa-closed-captioning"></i> Multi Audio</span>
            <span class="p-tag" style="background:#00875a; color:#fff;">1080p Ultra HD</span>
        </div>
    </div>

    <script>
        // URL से Video ID और Title निकालने का स्क्रिप्ट
        function getUrlVars() {
            var vars = {};
            var parts = window.location.href.replace(/[?&]+([^=&]+)=([^&]*)/gi, function(m,key,value) {
                vars[key] = value;
            });
            return vars;
        }

        const videoId = getUrlVars()["id"];
        const videoTitle = decodeURIComponent(getUrlVars()["title"]);

        if (videoId) {
            // यूट्यूब का नो-कुकी (No-cookie) सर्वर लिंक ताकि यूजर आपकी साइट पर ही रहे
            document.getElementById('videoPlayer').src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1`;
        }
        if (videoTitle && videoTitle !== "undefined") {
            document.getElementById('videoTitle').innerText = videoTitle;
        }
    </script>
</body>
</html>
