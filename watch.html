<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Player - RaceDrive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background-color: #050508;
            color: #00ffcc;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 960px;
        }

        .back-home {
            background: #000;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 10px 22px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 25px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.3);
        }

        .back-home:hover {
            background: #ff0055;
            color: #fff;
            border-color: #ff0055;
            box-shadow: 0 0 15px #ff0055;
        }

        /* 🎬 साइबर थियेटर प्लेयर */
        .player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%;
            background: #000;
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }

        .player-wrapper video, .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .details-box {
            background: #0a0b10;
            padding: 25px;
            margin-top: 25px;
            border: 2px solid #ff0055;
            box-shadow: 0 0 15px rgba(255, 0, 85, 0.2);
        }

        h2 {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 15px;
            text-shadow: 0 0 5px #00ffcc;
        }

        .download-box {
            margin-top: 20px;
        }

        .btn-dl {
            background: #000;
            color: #ff0055;
            border: 2px solid #ff0055;
            text-align: center;
            padding: 15px;
            font-weight: bold;
            text-decoration: none;
            display: block;
            font-size: 1.1rem;
            letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
            transition: 0.2s;
        }

        .btn-dl:hover {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 20px #ff0055;
            transform: scale(1.01);
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <a href="index.html" class="back-home">[ << बैक टू मेनू ]</a>

        <div class="player-wrapper" id="videoBox"></div>

        <div class="details-box">
            <h2 id="titleText">Loading_System_Core...</h2>
            <div class="download-box">
                <a href="#" id="dlServer1" target="_blank" class="btn-dl">[ 📥 डिक्रिप्ट एंड डाउनलोड फ़ाइल ]</a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        const titleText = decodeURIComponent(urlParams.get('title') || 'Secure Stream');

        document.getElementById('titleText').innerText = "📍 PLAYING: " + titleText;
        const videoBox = document.getElementById('videoBox');

        if (videoUrl.includes('youtube.com') || videoUrl.includes('embed')) {
            videoBox.innerHTML = `<iframe src="${videoUrl}?autoplay=1&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        } else {
            videoBox.innerHTML = `<video src="${videoUrl}" controls autoplay></video>`;
        }

        document.getElementById('dlServer1').href = videoUrl;
    </script>
</body>
        </html>
