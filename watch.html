<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Player - Race Drive</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #06060c;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin-top: 10px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #e50914;
            border-color: #e50914;
            box-shadow: 0 0 15px rgba(229, 9, 20, 0.4);
        }

        .player-box {
            width: 100%;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        :root { --plyr-color-main: #e50914; }

        .movie-info-section {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            padding: 22px;
            border-radius: 12px;
            margin-top: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        h2 { font-size: 1.6rem; margin-bottom: 12px; font-weight: 700; }

        .tags { display: flex; gap: 10px; margin-bottom: 25px; }
        .tag { background: rgba(255, 255, 255, 0.08); padding: 5px 12px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; color: #ffb400; }

        .download-container {
            margin-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            padding-top: 20px;
        }

        /* 💎 3D ग्लास इफ़ेक्ट डाउनलोड बटन */
        .dl-btn {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 2px 4px rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
        }

        .dl-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-4px);
            border-color: #e50914;
            box-shadow: 0 15px 30px rgba(229, 9, 20, 0.4);
        }

        .timer-box {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            color: #ffb400;
            border: 1px dashed #e50914;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">⬅ होम पेज</a>

        <div class="player-box"><div id="playerContainer"></div></div>

        <div class="movie-info-section">
            <h2 id="movieTitle">Loading...</h2>
            <div class="tags"><span class="tag">Ultra HD</span><span class="tag">Fast Server</span><span class="tag">Hindi</span></div>

            <div class="download-container">
                <div id="downloadTimer" class="timer-box">⏳ Generating Link... <span id="countdown">5</span> Seconds...</div>
                <button id="startDownloadBtn" class="dl-btn">⚡ Get High-Speed Download Link</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video') || '';
        const movieTitle = decodeURIComponent(urlParams.get('title') || 'Race Hub Video');
        document.getElementById('movieTitle').innerText = movieTitle;

        const playerContainer = document.getElementById('playerContainer');
        if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be') || videoUrl.includes('embed')) {
            let videoId = videoUrl.split('embed/')[1] || videoUrl.split('v=')[1];
            if(videoId) videoId = videoId.split('&')[0];
            playerContainer.innerHTML = `<div class="plyr__video-embed" id="player"><iframe src="https://www.youtube.com/embed/${videoId}?modestbranding=1&rel=0" allowfullscreen allow="autoplay"></iframe></div>`;
        } else {
            playerContainer.innerHTML = `<video id="player" controls><source src="${videoUrl}" type="video/mp4" /></video>`;
        }

        const player = new Plyr('#player', { ratio: '16:9' });

        const btn = document.getElementById('startDownloadBtn');
        btn.addEventListener('click', function() {
            const timerBox = document.getElementById('downloadTimer');
            const countdownSpan = document.getElementById('countdown');
            btn.style.display = 'none';
            timerBox.style.display = 'block';
            let timeLeft = 5;
            
            const downloadInterval = setInterval(function() {
                timeLeft--;
                countdownSpan.innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(downloadInterval);
                    timerBox.innerHTML = "✅ Downloading...";
                    setTimeout(function() {
                        window.open(videoUrl, '_blank');
                        timerBox.style.display = 'none';
                        btn.style.display = 'block';
                        btn.innerHTML = "📥 Download Again";
                    }, 1000);
                }
            }, 1000);
        });
    </script>
</body>
</html>WELCOME
