<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing - Race Drive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b12;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        .back-btn {
            background: #161722;
            color: #fff;
            border: 1px solid #232537;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: #e50914;
            border-color: #e50914;
        }

        .player-box {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Ratio */
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #232537;
        }

        .player-box video, .player-box iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .movie-info-section {
            background: #161722;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            border: 1px solid #232537;
        }

        h2 {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 10px;
        }

        .tags {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tag {
            background: #242535;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffb400;
        }

        .download-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 20px;
            border-top: 1px solid #232537;
            padding-top: 20px;
        }

        .dl-btn {
            background: #25a25a;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.2s;
            display: block;
        }

        .dl-btn:hover {
            background: #1e8449;
            transform: scale(1.01);
        }

        .dl-btn.mirror {
            background: #2e3142;
            color: #fff;
        }

        .dl-btn.mirror:hover {
            background: #3e4259;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">⬅ होम पेज पर जाएं</a>

        <div class="player-box" id="playerContainer"></div>

        <div class="movie-info-section">
            <h2 id="movieTitle">Loading Title...</h2>
            <div class="tags">
                <span class="tag">Full HD</span>
                <span class="tag">Fast Stream</span>
                <span class="tag">Audio: Hindi</span>
            </div>

            <div class="download-container">
                <a href="#" id="primaryDownload" target="_blank" class="dl-btn">📥 Download Link (Fast Server)</a>
                <a href="#" id="mirrorDownload" target="_blank" class="dl-btn mirror">🔗 Watch Online / Mirror Link</a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        const movieTitle = decodeURIComponent(urlParams.get('title') || 'Race Hub Video');

        document.getElementById('movieTitle').innerText = movieTitle;
        const playerContainer = document.getElementById('playerContainer');

        if (videoUrl.includes('youtube.com') || videoUrl.includes('youtu.be') || videoUrl.includes('embed')) {
            playerContainer.innerHTML = `<iframe src="${videoUrl}?autoplay=1&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        } else {
            playerContainer.innerHTML = `<video src="${videoUrl}" controls autoplay></video>`;
        }

        document.getElementById('primaryDownload').href = videoUrl;
        document.getElementById('mirrorDownload').href = videoUrl;
    </script>
</body>
</html>
