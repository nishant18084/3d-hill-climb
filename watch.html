<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Movie - Race Movies</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0b12;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 900px;
            margin-top: 20px;
        }

        /* बैक बटन */
        .back-btn {
            background: #e50914;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            transition: 0.2s;
            text-decoration: none;
            display: inline-block;
        }

        .back-btn:hover {
            background: #b81d24;
        }

        /* प्लेयर विंडो */
        .video-box {
            width: 100%;
            height: 500px;
            background: #000;
            border: 2px solid #e50914;
            border-radius: 8px;
            box-shadow: 0 0 25px rgba(229, 9, 20, 0.4);
            overflow: hidden;
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .movie-title {
            margin-top: 15px;
            font-size: 1.5rem;
            color: #ffffff;
        }

        /* एरर मैसेज स्टाइल */
        .error-msg {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #cccccc;
            text-align: center;
            font-size: 1.1rem;
            background: rgba(0,0,0,0.8);
            padding: 20px;
            border-radius: 8px;
            width: 80%;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn">⬅ होम पेज पर वापस जाएं</a>

        <div class="video-box">
            <video id="main-player" controls controlsList="nodownload" autoplay></video>
            <div id="error-screen" class="error-msg">
                🎬 यह वीडियो फ़ाइल अभी आपके सर्वर/GitHub पर अपलोडेड नहीं है। <br>
                <small style="color: #666;">कृपया इस नाम की MP4 फ़ाइल रिपॉजिटरी में जोड़ें।</small>
            </div>
        </div>

        <h2 class="movie-title" id="movie-name">लोड हो रहा है...</h2>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        const movieTitle = urlParams.get('title');
        const player = document.getElementById('main-player');
        const errorScreen = document.getElementById('error-screen');

        if (videoUrl && movieTitle) {
            player.src = videoUrl;
            document.getElementById('movie-name').innerText = decodeURIComponent(movieTitle);
            
            // अगर वीडियो फाइल नहीं मिलती है तो एरर हैंडल करें
            player.onerror = function() {
                errorScreen.style.display = "block";
            };
        } else {
            document.getElementById('movie-name').innerText = "कोई वीडियो नहीं मिला!";
        }
    </script>

</body>
</html>
