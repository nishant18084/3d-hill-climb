<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Online - RaceDrive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background-color: #08090d;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .wrapper {
            width: 100%;
            max-width: 960px;
            margin-top: 10px;
        }

        .back-home {
            background: #12131c;
            color: #fff;
            border: 1px solid #232537;
            padding: 10px 22px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 25px;
            transition: 0.2s;
        }

        .back-home:hover {
            background: #e50914;
            border-color: #e50914;
        }

        /* 🎬 थियेटर प्लेयर मोड */
        .player-wrapper {
            position: relative;
            width: 100%;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.8);
            border: 1px solid #1c1d2a;
        }

        .player-wrapper video, .player-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* इन्फो बॉक्स */
        .details-box {
            background: #12131c;
            padding: 25px;
            border-radius: 12px;
            margin-top: 25px;
            border: 1px solid #1c1d2a;
        }

        h2 {
            font-size: 1.6rem;
            color: #fff;
            margin-bottom: 12px;
        }

        .badges {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }

        .badge {
            background: #1c1d2a;
            padding: 5px 12px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
            color: #ffb400;
        }

        /* 📥 MoviesDrive स्टाइल डाउनलोड पैक्स */
        .download-box {
            border-top: 1px solid #232537;
            padding-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .btn-dl {
            background: #25a25a;
            color: white;
            text-align: center;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
            display: block;
            box-shadow: 0 4px 12px rgba(37,162,90,0.2);
        }

        .btn-dl:hover {
            background: #1e8449;
            transform: translateY(-2px);
        }

        .btn-dl.alternate {
            background: #232537;
            color: #fff;
            box-shadow: none;
        }

        .btn-dl.alternate:hover {
            background: #2f324a;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <a href="index.html" class="back-home">⬅ वापस होम पेज पर जाएं</a>

        <div class="player-wrapper" id="videoBox"></div>

        <div class="details-box">
            <h2 id="titleText">Loading...</h2>
            <div class="badges">
                <span class="badge">Ultra Fast Stream</span>
                <span class="badge">Google Shared Alternative</span>
                <span class="badge">1080p Max</span>
            </div>

            <div class="download-box">
                <a href="#" id="dlServer1" target="_blank" class="btn-dl">📥 Download / Stream Link (Server 1)</a>
                <a href="#" id="dlServer2" target="_blank" class="btn-dl alternate">🔗 Mirror Link (Server 2)</a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoUrl = urlParams.get('video');
        const titleText = decodeURIComponent(urlParams.get('title') || 'Race Hub Video');

        document.getElementById('titleText').innerText = titleText;
        const videoBox = document.getElementById('videoBox');

        // अगर लिंक YouTube का है तो iframe, नहीं तो normal HTML5 video player
        if (videoUrl.includes('youtube.com') || videoUrl.includes('embed')) {
            videoBox.innerHTML = `<iframe src="${videoUrl}?autoplay=1&rel=0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
        } else {
            videoBox.innerHTML = `<video src="${videoUrl}" controls autoplay></video>`;
        }

        document.getElementById('dlServer1').href = videoUrl;
        document.getElementById('dlServer2').href = videoUrl;
    </script>
</body>
</html>
